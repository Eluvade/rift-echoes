<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rift Echoes — Layer Harness</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        background: #0a0a0c;
        color: #ccc;
        font-family: 'Segoe UI', monospace;
        min-height: 100vh;
        overflow: hidden;
    }
    canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
    }
    .panel {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 5;
        background: rgba(20, 20, 25, 0.85);
        border: 1px solid #333;
        padding: 12px 16px;
        max-width: 320px;
        font-size: 0.78rem;
        line-height: 1.5;
        backdrop-filter: blur(6px);
    }
    .panel h2 {
        font-size: 0.85rem;
        color: #88aaff;
        margin-bottom: 6px;
    }
    .panel label {
        display: flex;
        align-items: center;
        gap: 6px;
        cursor: pointer;
        user-select: none;
    }
    .panel input[type=checkbox] { cursor: pointer; }
    .panel select, .panel input[type=text] {
        background: #181820;
        color: #ccc;
        border: 1px solid #333;
        padding: 2px 6px;
        font-family: inherit;
        font-size: inherit;
    }
    .panel .row { margin-bottom: 6px; }
    .panel .hint { color: #666; font-size: 0.7rem; }
    .panel code {
        background: #181820;
        padding: 1px 4px;
        color: #99ccff;
    }
    .center-marker {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 4px;
        height: 4px;
        background: #444;
        border-radius: 50%;
        transform: translate(-50%, -50%);
        pointer-events: none;
        z-index: 1;
    }
    .respawn-btn {
        background: #2a2a35;
        color: #ccc;
        border: 1px solid #444;
        padding: 4px 10px;
        cursor: pointer;
        font-family: inherit;
        font-size: inherit;
    }
    .respawn-btn:hover { background: #3a3a48; }
</style>
</head>
<body>
<div class="center-marker"></div>
<div class="panel" id="panel">
    <h2>Cargo Cache Harness</h2>
    <div class="row">
        <label>Rarity:
            <select id="raritySel">
                <option value="Common">Common</option>
                <option value="Uncommon">Uncommon</option>
                <option value="Rare">Rare</option>
                <option value="Epic">Epic</option>
                <option value="Legendary">Legendary</option>
                <option value="Unique">Unique</option>
            </select>
        </label>
    </div>
    <div class="row">
        <div>Layers:</div>
        <div id="layerList"></div>
    </div>
    <div class="row">
        <label>DMP override (single layer): <input type="text" id="dmpInput" placeholder="0.5,0.2,1,1" size="14"></label>
        <div class="hint">comma-separated 4 floats; leave blank for spec value</div>
    </div>
    <div class="row">
        <button class="respawn-btn" id="respawn">Destroy</button>
    </div>
    <div class="row hint">
        URL: <code id="urlEcho">?rarity=Unique</code>
    </div>
</div>
<script type="module">
    import { RiftRenderer, Rarity, RARITY_CONFIGS } from '../dist/index.js';

    // ─── URL state ────────────────────────────────────────────────────────
    const url = new URL(window.location.href);
    const params = url.searchParams;
    const rarityName = params.get('rarity') ?? 'Unique';
    const layersParam = params.get('layers');
    const dmpParam = params.get('dmp');
    const sizeParam = parseFloat(params.get('size'));   // ?size=<scale> overrides the drop scale (capture tooling)
    const dropSize = Number.isNaN(sizeParam) ? 1.5 : sizeParam;

    const rarity = Rarity[rarityName] ?? Rarity.Unique;
    const config = RARITY_CONFIGS[rarity];

    const parseLayers = (s) => s
        ? s.split(',').map(x => parseInt(x.trim(), 10)).filter(n => !Number.isNaN(n))
        : null;
    const parseDmp = (s) => {
        if (!s) return null;
        const v = s.split(',').map(parseFloat);
        return v.length === 4 && v.every(n => !Number.isNaN(n)) ? v : null;
    };

    let layerMask = parseLayers(layersParam);
    const dmpOverride = parseDmp(dmpParam);

    // DMP override only applies when exactly one layer is visible (otherwise
    // it'd be ambiguous which layer to override). We splice it onto a *copy*
    // of the config layer so we don't mutate RARITY_CONFIGS persistently.
    if (dmpOverride && layerMask && layerMask.length === 1) {
        const idx = layerMask[0];
        if (config.layers[idx]) {
            config.layers[idx] = { ...config.layers[idx], dmp: dmpOverride };
        }
    }

    // ─── Render setup ─────────────────────────────────────────────────────
    const renderer = new RiftRenderer();

    // ?freeze=<radians> pins the star breath at a fixed phase so the
    // contact-sheet captures every cell at the same point in the pulse.
    const freezeParam = params.get('freeze');
    if (freezeParam != null && freezeParam !== '') {
        const f = parseFloat(freezeParam);
        if (!Number.isNaN(f)) renderer.breathPhase = f;
    }

    const dpr = () => window.devicePixelRatio || 1;
    const center = () => [window.innerWidth / 2 * dpr(), window.innerHeight / 2 * dpr()];

    let cache = null;
    // Tracks intent so the button is a clean toggle: true = a drop is live and
    // the next press destroys it; false = nothing live and the next press
    // respawns. Decoupled from cache.finished so a press during the despawn
    // animation still flips correctly.
    let alive = false;

    function setRespawnLabel() {
        const btn = document.getElementById('respawn');
        if (btn) btn.textContent = alive ? 'Destroy' : 'Respawn';
    }

    function spawn() {
        if (cache && !cache.finished) cache.destroy();
        const [cx, cy] = center();
        cache = renderer.createCargoCache({
            rarity,
            x: cx,
            y: cy,
            size: dropSize,  // 1.5 by default; ?size= overrides for capture framing
            layerMask: layerMask ?? undefined,
        });
        window.riftCache = cache;
        alive = true;
        setRespawnLabel();
    }

    function despawn() {
        if (cache && !cache.finished) cache.destroy();
        alive = false;
        setRespawnLabel();
    }
    spawn();

    window.addEventListener('resize', () => {
        if (cache && !cache.finished) {
            const [cx, cy] = center();
            cache.x = cx;
            cache.y = cy;
        }
    });

    // ─── Panel UI ─────────────────────────────────────────────────────────
    const raritySel = document.getElementById('raritySel');
    const layerList = document.getElementById('layerList');
    const dmpInput  = document.getElementById('dmpInput');
    const urlEcho   = document.getElementById('urlEcho');
    const respawn   = document.getElementById('respawn');

    raritySel.value = rarityName;

    config.layers.forEach((spec, idx) => {
        const row = document.createElement('label');
        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = !layerMask || layerMask.includes(idx);
        cb.dataset.idx = idx;
        const dmpStr = (spec.dmp ?? []).map(n => n.toFixed(2)).join(', ') || '—';
        row.append(cb, document.createTextNode(`L${idx} ${spec.kind}  ·  dmp [${dmpStr}]`));
        cb.addEventListener('change', updateMaskFromUI);
        layerList.appendChild(row);
    });

    if (dmpOverride) dmpInput.value = dmpOverride.join(',');

    function currentMaskFromCheckboxes() {
        return Array.from(layerList.querySelectorAll('input[type=checkbox]'))
            .filter(cb => cb.checked)
            .map(cb => parseInt(cb.dataset.idx, 10));
    }

    function pushUrl(next) {
        const u = new URL(window.location.href);
        u.search = '';
        u.searchParams.set('rarity', raritySel.value);
        if (next.layers && next.layers.length !== config.layers.length) {
            u.searchParams.set('layers', next.layers.join(','));
        }
        if (dmpInput.value.trim()) u.searchParams.set('dmp', dmpInput.value.trim());
        window.history.replaceState(null, '', u);
        urlEcho.textContent = u.search || '(no params)';
    }

    function updateMaskFromUI() {
        const chosen = currentMaskFromCheckboxes();
        layerMask = chosen.length === config.layers.length ? null : chosen;
        pushUrl({ layers: chosen });
        spawn();
    }

    raritySel.addEventListener('change', () => {
        const u = new URL(window.location.href);
        u.search = '';
        u.searchParams.set('rarity', raritySel.value);
        window.location.href = u.toString();
    });

    dmpInput.addEventListener('change', () => {
        const u = new URL(window.location.href);
        u.search = '';
        u.searchParams.set('rarity', raritySel.value);
        const chosen = currentMaskFromCheckboxes();
        if (chosen.length !== config.layers.length) u.searchParams.set('layers', chosen.join(','));
        if (dmpInput.value.trim()) u.searchParams.set('dmp', dmpInput.value.trim());
        window.location.href = u.toString();
    });

    respawn.addEventListener('click', () => {
        if (alive) despawn();
        else spawn();
    });

    pushUrl({ layers: layerMask ?? config.layers.map((_, i) => i) });

    window.riftRenderer = renderer;
</script>
</body>
</html>
