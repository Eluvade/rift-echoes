<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rift Echoes</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        background: #111;
        color: #ccc;
        font-family: 'Segoe UI', monospace;
        min-height: 100vh;
        overflow: hidden;
    }
    h1 {
        text-align: center;
        padding: 16px;
        color: #88aaff;
        font-size: 1.3rem;
        position: relative;
        z-index: 1;
    }
    canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
    }
    .labels {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 1;
    }
    .label {
        position: absolute;
        color: #666;
        font-size: 0.7rem;
        text-align: center;
        transform: translate(-50%, 0);
        text-transform: uppercase;
        letter-spacing: 0.1em;
    }
    .click-zones {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 2;
    }
    .click-zone {
        position: absolute;
        width: 160px;
        height: 160px;
        border-radius: 50%;
        cursor: pointer;
        transform: translate(-50%, -50%);
    }
</style>
</head>
<body>
<h1>Rift Echoes — Cargo Cache</h1>
<div class="labels" id="labels"></div>
<div class="click-zones" id="clickZones"></div>
<script type="module">
    import { RiftRenderer, Rarity } from '../dist/index.js';

    const renderer = new RiftRenderer();

    const rarities = [
        { rarity: Rarity.Common, name: 'Common' },
        { rarity: Rarity.Uncommon, name: 'Uncommon' },
        { rarity: Rarity.Rare, name: 'Rare' },
        { rarity: Rarity.Epic, name: 'Epic' },
        { rarity: Rarity.Legendary, name: 'Legendary' },
        { rarity: Rarity.Unique, name: 'Unique' },
    ];

    const caches = [];
    const labelsContainer = document.getElementById('labels');
    const clickZonesContainer = document.getElementById('clickZones');

    function layout() {
        const w = window.innerWidth;
        const h = window.innerHeight;
        const dpr = window.devicePixelRatio || 1;
        const cols = 3;
        const rows = 2;
        const cellW = w / cols;
        const cellH = h / rows;

        labelsContainer.innerHTML = '';
        clickZonesContainer.innerHTML = '';

        rarities.forEach((r, i) => {
            const col = i % cols;
            const row = Math.floor(i / cols);
            const cssX = (col + 0.5) * cellW;
            const cssY = (row + 0.5) * cellH;
            const x = cssX * dpr;
            const y = cssY * dpr;

            if (caches[i] && !caches[i].finished) {
                caches[i].x = x;
                caches[i].y = y;
            } else if (!caches[i]) {
                caches[i] = renderer.createCargoCache({
                    rarity: r.rarity,
                    x,
                    y,
                    size: 1.0,
                });
            }

            // Label below the glow
            const label = document.createElement('div');
            label.className = 'label';
            label.textContent = r.name;
            label.style.left = `${cssX}px`;
            label.style.top = `${cssY + 100}px`;
            labelsContainer.appendChild(label);

            // Click zone
            const zone = document.createElement('div');
            zone.className = 'click-zone';
            zone.style.left = `${cssX}px`;
            zone.style.top = `${cssY}px`;
            zone.addEventListener('click', () => {
                if (caches[i] && !caches[i].destroying) {
                    caches[i].destroy();
                }
            });
            clickZonesContainer.appendChild(zone);
        });
    }

    layout();
    window.addEventListener('resize', layout);

    window.riftCaches = caches;
    window.riftRenderer = renderer;
</script>
</body>
</html>
